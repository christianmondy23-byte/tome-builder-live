        // --- AI ORACLE LOGIC ---
        async function divinateLore(fieldLabel, fieldId) {
            const textarea = document.querySelector(`textarea[data-id="${fieldId}"]`);
            if (!textarea) return;
            const currentText = textarea.value;
            const originalVal = currentText;
            textarea.value = "The Oracle is scrying the weave of reality...";
            textarea.disabled = true;

            const userQuery = currentText.trim() === "" 
                ? `You are a master world-builder. Create an original and epic 3-4 sentence lore entry for the category "${fieldLabel}". Raw lore only, legendary tone.`
                : `You are a master world-builder. Expand these rough notes for "${fieldLabel}" into a legendary 3-4 sentence lore entry: ${currentText}`;

            try {
                const response = await fetch('/.netlify/functions/oracle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userQuery })
                });
                
                // Read the raw text first so we can see exact server errors
                const rawText = await response.text();
                
                if (!rawText) {
                    throw new Error("The server returned an empty void. The Oracle is silent.");
                }

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch(e) {
                    throw new Error("Server glitch! Netlify says: " + rawText.substring(0, 100));
                }

                if (!response.ok) throw new Error(data.error?.message || data.error || "Connection failed");
                
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    textarea.value = text.trim();
                    textarea.dispatchEvent(new Event('input', { bubbles: true }));
                } else { textarea.value = originalVal; }

            } catch (error) {
                textarea.value = originalVal;
                alert(`Oracle connection severed: ${error.message}`);
            }
            textarea.disabled = false;
        }

            ]},
            { id: "econ", title: "XIII. Economy", icon: "coins", audioPath: "./audio/economy.mp3", description: "Wealth, trade, and finance.", subsections: [
                { id: "econ_a", title: "A. Wealth", fields: [
                    { id: "econ_a_phil", label: "Philosophies", placeholder: "Economic models, stability." },
                    { id: "econ_a_cur", label: "Valuation", placeholder: "Currency, costs, barter." },
                    { id: "econ_a_ind", label: "Production", placeholder: "Industries, trade routes." },
                    { id: "econ_a_prof", label: "Services", placeholder: "Professions, labor, banking." }
                ]}
            ]},
            { id: "main_chars", title: "XIV. Main Characters", icon: "user-circle", audioPath: "./audio/main_chars.mp3", description: "Protagonists and antagonists.", dynamic: true, countKey: "mc_count", defaultCount: 1, templateTitle: "Main Character", templateFields: [
                { id: "id", label: "Core Identity", placeholder: "Name, titles, race, appearance." },
                { id: "back", label: "Background", placeholder: "Origin, past events, training." },
                { id: "role", label: "World Role", placeholder: "Status, goals, conflicts." },
                { id: "abil", label: "Abilities", placeholder: "Skills, items, resources." },
                { id: "perc", label: "Perception", placeholder: "Public image vs. reality." }
            ]},
            { id: "minor_chars", title: "XV. Minor Characters", icon: "users", audioPath: "./audio/minor_chars.mp3", description: "Supporting cast and archetypes.", dynamic: true, countKey: "minor_count", defaultCount: 1, templateTitle: "Minor Character", templateFields: [
                { id: "arch", label: "Archetype", placeholder: "Role, function, significance." },
                { id: "id", label: "Identity", placeholder: "Name, style, affiliations." },
                { id: "back", label: "Background", placeholder: "Status, traits, motivation." },
                { id: "plot", label: "Plot Hook", placeholder: "Relationship to main story." }
            ]},
            { id: "plot", title: "XVI. Plot Hooks", icon: "sparkles", audioPath: "./audio/plot.mp3", description: "Tensions, mysteries, and threats.", subsections: [
                { id: "plot_a", title: "A. Story Engines", fields: [
                    { id: "plot_a_hist", label: "Historical Issues", placeholder: "Grievances, artifacts." },
                    { id: "plot_a_soc", label: "Societal Tensions", placeholder: "Scarcity, ideology, class." },
                    { id: "plot_a_env", label: "Planetary", placeholder: "Disasters, phenomena." },
                    { id: "plot_a_thr", label: "External Threats", placeholder: "Invaders, rogue elements." },
                    { id: "plot_a_mys", label: "Mysteries", placeholder: "Unanswered questions." }
                ]}
            ]}
        ];

        let activeSectionId = BIBLE_OUTLINE[0].id;
        let worldData = {};
        let isSidebarOpen = false; 
        let wantsToPlay = true;

        const sidebarEl = document.getElementById('sidebar');
        const navContainer = document.getElementById('nav-container');
        const headerTitle = document.getElementById('header-title');
        const headerDesc = document.getElementById('header-desc');
        const subsectionsContainer = document.getElementById('subsections-container');
        const mainScroll = document.getElementById('main-scroll');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const fileInput = document.getElementById('file-input');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const volumeSlider = document.getElementById('volume-slider');
        const bgAudio = document.getElementById('bg-audio');
        const audioSectionLabel = document.getElementById('audio-section-label');
        const audioStatus = document.getElementById('audio-status');

        function init() {
            const saved = localStorage.getItem('grimoireWorldDataV2');
            if (saved) { try { worldData = JSON.parse(saved); } catch (e) { console.error(e); } }
            bgAudio.volume = volumeSlider.value;
            renderSidebar();
            renderMainContent();
            loadAudioForSection(activeSectionId);
        }

        function renderSidebar() {
            navContainer.innerHTML = '';
            BIBLE_OUTLINE.forEach(section => {
                const isActive = activeSectionId === section.id;
                const btn = document.createElement('button');
                btn.className = `group w-full flex items-center px-4 py-3 mb-1 text-sm rounded transition-all ${isActive ? 'bg-[#18130e] text-[#e5c158] border border-[#5c452e]' : 'text-[#8b6742] hover:bg-[#1c1611]'}`;
                btn.innerHTML = `<div class="flex items-center gap-3"><i data-lucide="${section.icon}" class="w-4 h-4 shrink-0"></i><span class="font-bold uppercase tracking-wide truncate">${section.title}</span></div>`;
                btn.onclick = () => { if(activeSectionId !== section.id){ activeSectionId = section.id; renderSidebar(); renderMainContent(); loadAudioForSection(activeSectionId); if(window.innerWidth < 768) toggleSidebar(false); }};
                navContainer.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderMainContent() {
            const activeSection = BIBLE_OUTLINE.find(s => s.id === activeSectionId);
            headerTitle.textContent = activeSection.title;
            headerDesc.textContent = activeSection.description;
            subsectionsContainer.innerHTML = '';

            if (activeSection.dynamic) {
                let count = parseInt(worldData[activeSection.countKey]) || activeSection.defaultCount;
                for(let i=0; i<count; i++) {
                    let fieldsHtml = '';
                    activeSection.templateFields.forEach(f => {
                        const fid = `${activeSection.id}_${i}_${f.id}`;
                        fieldsHtml += `<div class="flex flex-col gap-2 w-full"><div class="flex flex-col sm:flex-row justify-between items-start sm:items-center pl-1 gap-1 sm:gap-0"><label class="block text-[#a3805b] font-bold uppercase text-[0.75rem] md:text-[0.8rem] engraved-text break-words">${f.label}</label><button onclick="divinateLore('${f.label.replace(/'/g, "\\'")}', '${fid}')" class="text-amber-600 text-[10px] uppercase font-bold hover:text-amber-400 flex items-center shrink-0"><i data-lucide="sparkles" class="w-3 h-3 mr-1"></i>Consult Oracle</button></div><textarea data-id="${fid}" class="carved-input p-3 sm:p-4 rounded text-[1rem] sm:text-[1.15rem] font-serif min-h-[90px] w-full">${worldData[fid]||''}</textarea></div>`;
                    });
                    const div = document.createElement('div');
                    div.className = "bg-[#1c1611] rounded border-2 border-[#2c2015] p-4 sm:p-6 space-y-6 shadow-xl relative w-full overflow-hidden";
                    div.innerHTML = `<button onclick="removeDynamic('${activeSection.id}', ${i})" class="absolute top-4 right-4 text-red-900/50 hover:text-red-600"><i data-lucide="trash-2" class="w-5 h-5"></i></button><div class="absolute top-0 left-0 w-2 h-full bg-amber-600"></div><h3 class="text-xl sm:text-2xl text-[#d4a373] engraved-text pr-8 break-words">${activeSection.templateTitle} ${i+1}</h3>${fieldsHtml}`;
                    subsectionsContainer.appendChild(div);
                }
                const addBtn = document.createElement('button');
                addBtn.className = "w-full py-4 sm:py-5 border-2 border-dashed border-[#4a3620] text-[#8b6742] bg-[#120e0a] font-magic text-lg sm:text-xl uppercase hover:border-amber-600 hover:text-amber-500 transition-all break-words";
                addBtn.innerHTML = `Carve Another ${activeSection.templateTitle}`;
                addBtn.onclick = () => { worldData[activeSection.countKey] = count + 1; localStorage.setItem('grimoireWorldDataV2', JSON.stringify(worldData)); renderMainContent(); lucide.createIcons(); };
                subsectionsContainer.appendChild(addBtn);
            } else {
                activeSection.subsections.forEach(sub => {
                    let fieldsHtml = '';
                    sub.fields.forEach(f => {
                        fieldsHtml += `<div class="flex flex-col gap-2 w-full"><div class="flex flex-col sm:flex-row justify-between items-start sm:items-center pl-1 gap-1 sm:gap-0"><label class="block text-[#a3805b] font-bold uppercase text-[0.75rem] md:text-[0.8rem] engraved-text break-words">${f.label}</label><button onclick="divinateLore('${f.label.replace(/'/g, "\\'")}', '${f.id}')" class="text-amber-600 text-[10px] uppercase font-bold hover:text-amber-400 flex items-center shrink-0"><i data-lucide="sparkles" class="w-3 h-3 mr-1"></i>Consult Oracle</button></div><textarea data-id="${f.id}" class="carved-input p-3 sm:p-4 rounded text-[1rem] sm:text-[1.15rem] font-serif min-h-[90px] w-full">${worldData[f.id]||''}</textarea></div>`;
                    });
                    const div = document.createElement('div');
                    div.className = "bg-[#1c1611] rounded border-2 border-[#2c2015] p-4 sm:p-6 space-y-6 shadow-xl relative w-full overflow-hidden";
                    div.innerHTML = `<div class="absolute top-0 left-0 w-2 h-full bg-amber-600"></div><h3 class="text-xl sm:text-2xl text-[#d4a373] engraved-text break-words pr-2">${sub.title}</h3>${fieldsHtml}`;
                    subsectionsContainer.appendChild(div);
                });
            }
            lucide.createIcons();
        }

        function loadAudioForSection(sectionId) {
            const section = BIBLE_OUTLINE.find(s => s.id === sectionId);
            audioSectionLabel.innerHTML = `Rune: ${section.title.split('. ')[1] || section.title}`;
            if (section.audioPath) {
                bgAudio.src = section.audioPath;
                btnPlayPause.disabled = false;
                if (wantsToPlay) {
                    bgAudio.play().then(() => { 
                        playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden'); audioStatus.textContent = "Resonating"; 
                    }).catch(() => {
                        playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden'); audioStatus.textContent = "Click to Awaken";
                        const unlock = () => { if(wantsToPlay) bgAudio.play().then(() => { playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden'); audioStatus.textContent = "Resonating"; }); document.removeEventListener('click', unlock); };
                        document.addEventListener('click', unlock, {once: true});
                    });
                }
            }
        }

        function toggleSidebar(open) { isSidebarOpen = open; if(open) { sidebarEl.classList.remove('sidebar-closed'); sidebarEl.classList.add('sidebar-open'); } else { sidebarEl.classList.remove('sidebar-open'); sidebarEl.classList.add('sidebar-closed'); } }
        mobileMenuBtn.onclick = () => toggleSidebar(true);
        window.onclick = (e) => { if (isSidebarOpen && !sidebarEl.contains(e.target) && !mobileMenuBtn.contains(e.target)) toggleSidebar(false); };

        window.removeDynamic = function(sectionId, index) {
            if(!confirm("Are you sure you want to shatter this rune? The lore will be lost forever.")) return;
            const s = BIBLE_OUTLINE.find(x => x.id === sectionId);
            let count = parseInt(worldData[s.countKey]) || 1;
            if(count <= 1) return;
            for(let i=index; i<count-1; i++) { s.templateFields.forEach(f => { worldData[`${sectionId}_${i}_${f.id}`] = worldData[`${sectionId}_${i+1}_${f.id}`]; }); }
            s.templateFields.forEach(f => delete worldData[`${sectionId}_${count-1}_${f.id}`]);
            worldData[s.countKey] = count - 1;
            localStorage.setItem('grimoireWorldDataV2', JSON.stringify(worldData));
            renderMainContent();
        };

        mainScroll.addEventListener('input', (e) => { if(e.target.tagName==='TEXTAREA'){ worldData[e.target.dataset.id] = e.target.value; localStorage.setItem('grimoireWorldDataV2', JSON.stringify(worldData)); }});
        btnPlayPause.addEventListener('click', () => { if(bgAudio.paused){ wantsToPlay=true; bgAudio.play(); playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden'); audioStatus.textContent="Resonating"; } else { wantsToPlay=false; bgAudio.pause(); pauseIcon.classList.add('hidden'); playIcon.classList.remove('hidden'); audioStatus.textContent="Hushed"; }});
        volumeSlider.addEventListener('input', (e) => bgAudio.volume = e.target.value);
        document.getElementById('btn-save').onclick = () => { const blob = new Blob([JSON.stringify(worldData,null,2)], {type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download="Tome_Backup.json"; a.click(); };
        document.getElementById('btn-load').onclick = () => fileInput.click();
        fileInput.onchange = (e) => { const f=e.target.files[0]; const r=new FileReader(); r.onload=(ev)=>{ worldData=JSON.parse(ev.target.result); localStorage.setItem('grimoireWorldDataV2', JSON.stringify(worldData)); renderSidebar(); renderMainContent(); }; r.readAsText(f); };

        init();
    </script>
</body>
</html>
